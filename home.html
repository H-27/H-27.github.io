        /* Fullscreen Iframe Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            border: none;
            background: white;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        #loadingOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

<script>
  const API_BASE_URL = 'https://localhost:7089';
  const CUSTOM_API_KEY = 'OV52i_5c3k2ocNbm9oGkeg';

  const uploadBtn = document.getElementById('uploadBtn');
  const fileUploadInput = document.getElementById('fileUploadInput');
  const downloadBtn = document.getElementById('downloadBtn');
  const loadingOverlay = document.getElementById('loadingOverlay');

  // Trigger file selections
  uploadBtn.addEventListener('click', () => { fileUploadInput.click(); });

  fileUploadInput.addEventListener('change', async (event) => {
    const files = event.target.files;
    if (!files || files.length === 0) return;

    const formData = new FormData();
    for (let i = 0; i < files.length; i++) { formData.append('files', files[i]); }

    try {
        const response = await fetch(`${API_BASE_URL}/upload-images`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'X-Custom-Auth-Key': CUSTOM_API_KEY },
            body: formData
        });
        if (!response.ok) throw new Error('Upload failed');
        alert("Upload successful!");
        loadRandomImages();
    } catch (error) {
        alert('Upload failed.');
    } finally { fileUploadInput.value = ''; }
  });

  downloadBtn.addEventListener('click', async () => {
    try {
        const response = await fetch(`${API_BASE_URL}/download-all-images`, {
            method: 'GET',
            credentials: 'include',
            headers: { 'X-Custom-Auth-Key': CUSTOM_API_KEY }
        });
        if (!response.ok) throw new Error('Download failed');
        const blob = await response.blob();
        const downloadUrl = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = 'images.zip';
        document.body.appendChild(a);
        a.click();
        a.remove();
        window.URL.revokeObjectURL(downloadUrl);
    } catch (error) {
        alert('Download failed.');
    }
  });

  // FETCH AND DISPLAY RANDOM IMAGES ON LOAD
  async function loadRandomImages() {
    const galleryImages = document.querySelectorAll('.gallery-img');
    if (galleryImages.length === 0) return;

    try {
        const count = galleryImages.length;
        const response = await fetch(API_BASE_URL + '/get-homepage-images/' + count, {
            method: 'GET',
            credentials: 'include',
            headers: { 'X-Custom-Auth-Key': CUSTOM_API_KEY }
        });

        if (!response.ok) {
            alert("Backend returned error status: " + response.status);
            throw new Error('Failed to fetch images');
        }

        const imagesData = await response.json(); 
        
        if (!imagesData || imagesData.length === 0) {
            alert("Data received successfully, but the image array is empty: []");
            return;
        }

        // Direct stream mapping. No loops or rewrite rules needed for short-lived tempauth download links
        for (let i = 0; i < imagesData.length && i < galleryImages.length; i++) {
            if (imagesData[i].downloadUrl) {
                galleryImages[i].src = imagesData[i].downloadUrl;
            } else if (imagesData[i].DownloadUrl) {
                // Account for casing variance
                galleryImages[i].src = imagesData[i].DownloadUrl;
            }
        }
    } catch (error) {
        alert("CRITICAL ERROR: " + error.message);
    } finally {
        // Fade out overlay
        if (loadingOverlay) { loadingOverlay.classList.add('hidden'); }
    }
  }

  // Trigger core sequence
  loadRandomImages();
</script>
</body>
</html>
