<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: white;
            overflow: hidden; /* Prevents scrollbars during mobile scaling */
        }
        /* Adds a subtle zoom effect when hovering over the interactive Komponente 7 */
        .component-link {
            transition: transform 0.3s ease, filter 0.3s ease;
            cursor: pointer;
        }
        .component-link:hover {
            transform: scale(1.03);
            filter: drop-shadow(0px 10px 25px rgba(0,0,0,0.2));
        }
        @media (max-width: 768px) {
            #scaleWrapper { transform: none !important; width: 100vw !important; height: 100vh !important; }
            #scaleWrapper > div {
                width: 100% !important;
                height: 100vh !important;
                display: flex !important;
                flex-direction: column !important;
                align-items: center !important;
                justify-content: center !important;
                background: linear-gradient(135deg, #3A7065 0%, #A9A73E 100%) !important;
                padding: 0 !important;
            }
            #scaleWrapper > div > div { display: none !important; } /* Hides desktop gradients */
            #scaleWrapper img[alt="Logo"] {
                position: static !important;
                width: 80% !important;
                height: auto !important;
                margin: 0 0 50px 0 !important;
            }
            #scaleWrapper a.component-link {
                position: static !important;
                width: 80% !important;
                height: auto !important;
                margin: 0 !important;
            }
        }
    </style>
</head>
<body>

<div id="scaleWrapper" style="transform-origin: top left; width: 1920px;">

    <div style="width: 1920px; height: 1080px; position: relative; background: white; overflow: hidden">
      <div style="width: 1011.98px; height: 1080px; left: -51.98px; top: 0px; position: absolute; background: linear-gradient(90deg, #3A7065 35%, #A9A73E 100%)"></div>
      
      <div style="width: 1011.98px; height: 1080px; left: 1960.98px; top: 1080px; position: absolute; transform: rotate(180deg); transform-origin: top left; background: linear-gradient(90deg, #3A7065 35%, #A9A73E 100%)"></div>
      
      <img style="width: 1128px; height: 995px; left: 356px; top: 43px; position: absolute; pointer-events: none;" src="assets/images/Logo.png" alt="Logo" />
      
      <a href="home.html" style="position: absolute; left: 250.71px; top: 650.52px; display: block; width: 1338.57px; height: 246.48px; z-index: 10;" class="component-link">
        <img style="width: 100%; height: 100%;" src="assets/images/Komponente_7.png" alt="Navigate to Home" />
      </a>
    </div>

</div>

<style>
    body { 
        margin: 0; 
        padding: 0; 
        background-color: white;
        overflow-x: hidden; /* Only hide horizontal clipping */
    }
    .component-link {
        transition: transform 0.3s ease, filter 0.3s ease;
        cursor: pointer;
    }
    .component-link:hover {
        transform: scale(1.03);
        filter: drop-shadow(0px 10px 25px rgba(0,0,0,0.2));
    }
</style>

<script>
    function autoScaleIndex() {
        const wrapper = document.getElementById('scaleWrapper');
        
        if (window.innerWidth <= 768) {
            wrapper.style.transform = 'none';
            wrapper.style.height = '100vh';
            document.body.style.height = '100vh';
            return;
        }

        const scaleRatio = window.innerWidth / 1920;
        
        // Scale the canvas container
        wrapper.style.transform = `scale(${scaleRatio})`;
        
        // DYNAMIC HEIGHT: This forces the page to be exactly as long as its contents need on mobile
        const calculatedHeight = 1080 * scaleRatio;
        wrapper.style.height = `${calculatedHeight}px`;
        document.body.style.height = `${calculatedHeight}px`;
    }

    // Run instantly on load and device orientation/resize adjustments
    window.addEventListener('load', autoScaleIndex);
    window.addEventListener('resize', autoScaleIndex);
    autoScaleIndex(); // Immediate initialization call
</script>
</body>
</html>
