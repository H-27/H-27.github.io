<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>web_2</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            background: white; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Full viewport bounding container */
        .fullscreen-bg {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Responsive Side Gradients matching the viewport boundaries */
        .gradient-left {
            width: 55vw;
            height: 110vh;
            left: -5vw;
            top: -5vh;
            position: absolute;
            background: linear-gradient(90deg, #3A7065 35%, #A9A73E 100%);
        }

        .gradient-right {
            width: 55vw;
            height: 110vh;
            right: -5vw;
            bottom: -5vh;
            position: absolute;
            transform: rotate(180deg);
            transform-origin: center;
            background: linear-gradient(90deg, #3A7065 35%, #A9A73E 100%);
        }

        /* Forces both graphics to match 100% of screen height and width regardless of device */
        #backgroundImageLoop, #loadingImage {
            position: absolute;
            left: 0;
            top: 0;
            width: 100vw;   /* 100% of viewport width */
            height: 100vh;  /* 100% of viewport height */
            object-fit: fill; /* Stretches the image canvas directly to the screen edges */
        }

        /* Layers the background asset beneath the flashing text */
        #backgroundImageLoop {
            z-index: 5;
        }

        /* Layers the text asset perfectly on top */
        #loadingImage {
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="fullscreen-bg">
  <div class="gradient-left"></div>
  <div class="gradient-right"></div>

  <img id="backgroundImageLoop" src="assets/images/Komponente_8.png" alt="Background Graphic" />
  
  <img id="loadingImage" src="assets/images/web2_loading2 (1).png" alt="Loading..." />
</div>

<script>
  const loadingImage = document.getElementById('loadingImage');
  const img1 = 'assets/images/web2_loading2 (1).png';
  const img2 = 'assets/images/web2_loading2 (2).png';
  
  let currentImageIsOne = true;
  
  setInterval(() => {
    loadingImage.src = currentImageIsOne ? img2 : img1;
    currentImageIsOne = !currentImageIsOne;
  }, 500);
</script>
</body>
</html>
