<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loading</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            background: white; 
            overflow: hidden;
        }

        /* 1920x1080 Bounding container matching index asset structures */
        .fullscreen-bg {
            width: 1920px;
            height: 1080px;
            position: relative;
            overflow: hidden;
        }

        /* Side Gradients adapted to match the fixed resolution coordinates */
        .gradient-left {
            width: 1056px; /* 55% of 1920px */
            height: 1188px; /* 110% of 1080px */
            left: -96px;
            top: -54px;
            position: absolute;
            background: linear-gradient(90deg, #3A7065 35%, #A9A73E 100%);
        }

        .gradient-right {
            width: 1056px;
            height: 1188px;
            right: -96px;
            bottom: -54px;
            position: absolute;
            transform: rotate(180deg);
            transform-origin: center;
            background: linear-gradient(90deg, #3A7065 35%, #A9A73E 100%);
        }

        /* Forces both graphics to pin cleanly inside the canvas layout */
        #backgroundImageLoop, #loadingImage {
            position: absolute;
            left: 0;
            top: 0;
            width: 1920px;
            height: 1080px;
            object-fit: fill;
        }

        /* Layers the background asset beneath the flashing text */
        #backgroundImageLoop {
            z-index: 5;
        }

        /* Layers the text asset perfectly on top */
        #loadingImage {
            z-index: 10;
        }
    </style>
</head>
<body>

<div id="scaleWrapper" style="transform-origin: top left; width: 1920px;">

    <div class="fullscreen-bg">
      <div class="gradient-left"></div>
      <div class="gradient-right"></div>

      <img id="backgroundImageLoop" src="assets/images/Komponente_8.png" alt="Background Graphic" />
      
      <img id="loadingImage" src="assets/images/web2_loading2 (1).png" alt="Loading..." />
    </div>

</div>

<script>
  const loadingImage = document.getElementById('loadingImage');
  const img1 = 'assets/images/web2_loading2 (1).png';
  const img2 = 'assets/images/web2_loading2 (2).png';
  
  let currentImageIsOne = true;
  
  // Flash text loop every 500ms
  setInterval(() => {
    loadingImage.src = currentImageIsOne ? img2 : img1;
    currentImageIsOne = !currentImageIsOne;
  }, 500);

  // 2. Scale handler targeting the loading layout frame
  function autoScaleLoading() {
      const wrapper = document.getElementById('scaleWrapper');
      const scaleRatio = window.innerWidth / 1920;
      
      wrapper.style.transform = `scale(${scaleRatio})`;
      document.body.style.height = `${1080 * scaleRatio}px`;
  }

  window.addEventListener('load', autoScaleLoading);
  window.addEventListener('resize', autoScaleLoading);
</script>
</body>
</html>
