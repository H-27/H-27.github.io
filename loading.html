<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loading</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            background: white; 
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* The background container scales to 100% of whatever device screen size is active */
        .fullscreen-bg {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Gradients now use viewport percentages so they dynamically stretch vertically */
        .gradient-left {
            width: 55vw;
            height: 110vh;
            left: -5vw;
            top: -5vh;
            position: absolute;
            background: linear-gradient(90deg, #3A7065 35%, #A9A73E 100%);
        }

        .gradient-right {
            width: 55vw;
            height: 110vh;
            right: -5vw;
            bottom: -5vh;
            position: absolute;
            transform: rotate(180deg);
            transform-origin: center;
            background: linear-gradient(90deg, #3A7065 35%, #A9A73E 100%);
        }

        /* This wrapper holds your central assets. It is always pinned dead-center 
           on the screen, regardless of whether the device is horizontal or vertical.
        */
        #centerAssetContainer {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 1920px;
            height: 1080px;
            /* Anchors the center point of the 1920x1080 canvas to the center of the phone screen */
            transform-origin: center center; 
            z-index: 10;
            pointer-events: none;
        }

        #backgroundImageLoop, #loadingImage {
            position: absolute;
            left: 0;
            top: 0;
            width: 1920px;
            height: 1080px;
            object-fit: fill;
        }
    </style>
</head>
<body>

<div class="fullscreen-bg">
    <div class="gradient-left"></div>
    <div class="gradient-right"></div>

    <div id="centerAssetContainer">
        <img id="backgroundImageLoop" src="assets/images/Komponente_8.png" alt="Background Graphic" />
        <img id="loadingImage" src="assets/images/web2_loading2 (1).png" alt="Loading..." />
    </div>
</div>

<script>
  const loadingImage = document.getElementById('loadingImage');
  const img1 = 'assets/images/web2_loading2 (1).png';
  const img2 = 'assets/images/web2_loading2 (2).png';
  
  let currentImageIsOne = true;
  
  setInterval(() => {
    loadingImage.src = currentImageIsOne ? img2 : img1;
    currentImageIsOne = !currentImageIsOne;
  }, 500);

  // Responsive logic built for ratio shifts
  function adjustLoadingScale() {
      const target = document.getElementById('centerAssetContainer');
      
      // Calculate individual scale paths for width and height
      const scaleX = window.innerWidth / 1920;
      const scaleY = window.innerHeight / 1080;
      
      // CHOOSE THE SAFEST FIT: 
      // On desktop, it scales normally. On portrait mobile, it uses the width limit 
      // so your graphics don't get squished or distorted out of proportion.
      const optimalScale = Math.min(scaleX, scaleY);
      
      // Centers the scaled container perfectly inside the screen viewport mask
      target.style.transform = `translate(-50%, -50%) scale(${optimalScale})`;
  }

  window.addEventListener('load', adjustLoadingScale);
  window.addEventListener('resize', adjustLoadingScale);
  adjustLoadingScale();
</script>
</body>
</html>
